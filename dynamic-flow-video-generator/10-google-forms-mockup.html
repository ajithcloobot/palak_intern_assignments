<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Forms Screen Mockup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            padding: 20px;
        }
        .mockup-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .forms-header {
            background: #673ab7;
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .forms-logo {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .forms-title {
            font-size: 20px;
            font-weight: 500;
        }
        .forms-toolbar {
            background: #f1f3f4;
            padding: 12px 24px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .toolbar-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toolbar-btn:hover {
            background: #f8f9fa;
            border-color: #673ab7;
        }
        .toolbar-btn.primary {
            background: #673ab7;
            color: white;
            border-color: #673ab7;
        }
        .form-editor {
            padding: 32px;
            min-height: 600px;
        }
        .form-title-input {
            width: 100%;
            font-size: 32px;
            font-weight: 400;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 8px 0;
            margin-bottom: 8px;
            transition: border-color 0.2s;
        }
        .form-title-input:focus {
            outline: none;
            border-bottom-color: #673ab7;
        }
        .form-description {
            width: 100%;
            font-size: 14px;
            color: #5f6368;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 8px 0;
            margin-bottom: 32px;
            transition: border-color 0.2s;
        }
        .form-description:focus {
            outline: none;
            border-bottom-color: #673ab7;
        }
        .form-question {
            background: white;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        .form-question:hover {
            border-color: #673ab7;
            box-shadow: 0 2px 8px rgba(103, 58, 183, 0.1);
        }
        .question-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }
        .drag-handle {
            cursor: move;
            color: #5f6368;
            font-size: 20px;
            padding: 4px;
        }
        .question-content {
            flex: 1;
        }
        .question-input {
            width: 100%;
            font-size: 16px;
            font-weight: 500;
            border: none;
            padding: 8px 0;
            margin-bottom: 12px;
        }
        .question-input:focus {
            outline: none;
        }
        .required-indicator {
            color: #ea4335;
            margin-left: 4px;
        }
        .question-options {
            margin-left: 32px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .option-radio {
            width: 20px;
            height: 20px;
            border: 2px solid #dadce0;
            border-radius: 50%;
            position: relative;
        }
        .option-radio.selected {
            border-color: #673ab7;
        }
        .option-radio.selected::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #673ab7;
            border-radius: 50%;
        }
        .option-text {
            flex: 1;
            font-size: 14px;
            padding: 8px;
            border: none;
            border-bottom: 1px solid transparent;
        }
        .option-text:focus {
            outline: none;
            border-bottom-color: #673ab7;
        }
        .question-actions {
            display: flex;
            gap: 8px;
            margin-left: 32px;
            margin-top: 12px;
        }
        .action-btn {
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: #5f6368;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: #f1f3f4;
            color: #673ab7;
        }
        .add-question-btn {
            width: 100%;
            padding: 16px;
            background: white;
            border: 2px dashed #dadce0;
            border-radius: 8px;
            color: #5f6368;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }
        .add-question-btn:hover {
            border-color: #673ab7;
            color: #673ab7;
            background: #f8f9fa;
        }
        .form-settings {
            background: #f8f9fa;
            padding: 24px;
            border-top: 1px solid #e0e0e0;
        }
        .settings-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .setting-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .setting-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #dadce0;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
        }
        .setting-checkbox.checked {
            background: #673ab7;
            border-color: #673ab7;
        }
        .setting-checkbox.checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
        }
        .setting-label {
            font-size: 14px;
            color: #3c4043;
        }
    </style>
</head>
<body>
    <div class="mockup-container">
        <!-- Google Forms Header -->
        <div class="forms-header">
            <div class="forms-logo">📝</div>
            <div class="forms-title">Google Forms</div>
        </div>
        
        <!-- Toolbar -->
        <div class="forms-toolbar">
            <button class="toolbar-btn">🎨 Theme</button>
            <button class="toolbar-btn">📊 Preview</button>
            <button class="toolbar-btn">👥 Share</button>
            <button class="toolbar-btn primary">✅ Send</button>
        </div>
        
        <!-- Form Editor -->
        <div class="form-editor">
            <input type="text" class="form-title-input" value="Event Registration Form" placeholder="Untitled form">
            <input type="text" class="form-description" value="Register for our upcoming tech event" placeholder="Form description">
            
            <!-- Question 1 -->
            <div class="form-question">
                <div class="question-header">
                    <div class="drag-handle">⋮⋮</div>
                    <div class="question-content">
                        <input type="text" class="question-input" value="Full Name">
                        <span class="required-indicator">*</span>
                    </div>
                </div>
                <div class="question-options">
                    <div class="option-item">
                        <div class="option-radio"></div>
                        <input type="text" class="option-text" value="Short answer" readonly>
                    </div>
                </div>
                <div class="question-actions">
                    <button class="action-btn">✏️ Edit</button>
                    <button class="action-btn">📋 Duplicate</button>
                    <button class="action-btn">🗑️ Delete</button>
                </div>
            </div>
            
            <!-- Question 2 -->
            <div class="form-question">
                <div class="question-header">
                    <div class="drag-handle">⋮⋮</div>
                    <div class="question-content">
                        <input type="text" class="question-input" value="Email Address">
                        <span class="required-indicator">*</span>
                    </div>
                </div>
                <div class="question-options">
                    <div class="option-item">
                        <div class="option-radio"></div>
                        <input type="text" class="option-text" value="Short answer" readonly>
                    </div>
                </div>
                <div class="question-actions">
                    <button class="action-btn">✏️ Edit</button>
                    <button class="action-btn">📋 Duplicate</button>
                    <button class="action-btn">🗑️ Delete</button>
                </div>
            </div>
            
            <!-- Question 3 -->
            <div class="form-question">
                <div class="question-header">
                    <div class="drag-handle">⋮⋮</div>
                    <div class="question-content">
                        <input type="text" class="question-input" value="Which event would you like to attend?">
                        <span class="required-indicator">*</span>
                    </div>
                </div>
                <div class="question-options">
                    <div class="option-item">
                        <div class="option-radio selected"></div>
                        <input type="text" class="option-text" value="Tech Summit 2024" readonly>
                    </div>
                    <div class="option-item">
                        <div class="option-radio"></div>
                        <input type="text" class="option-text" value="AI Workshop" readonly>
                    </div>
                    <div class="option-item">
                        <div class="option-radio"></div>
                        <input type="text" class="option-text" value="Web Development Bootcamp" readonly>
                    </div>
                </div>
                <div class="question-actions">
                    <button class="action-btn">✏️ Edit</button>
                    <button class="action-btn">📋 Duplicate</button>
                    <button class="action-btn">🗑️ Delete</button>
                </div>
            </div>
            
            <!-- Add Question Button -->
            <button class="add-question-btn">+ Add question</button>
            
            <!-- Form Settings -->
            <div class="form-settings">
                <div class="settings-title">Settings</div>
                <div class="settings-grid">
                    <div class="setting-item">
                        <div class="setting-checkbox checked"></div>
                        <span class="setting-label">Collect email addresses</span>
                    </div>
                    <div class="setting-item">
                        <div class="setting-checkbox"></div>
                        <span class="setting-label">Limit to 1 response</span>
                    </div>
                    <div class="setting-item">
                        <div class="setting-checkbox checked"></div>
                        <span class="setting-label">Show progress bar</span>
                    </div>
                    <div class="setting-item">
                        <div class="setting-checkbox"></div>
                        <span class="setting-label">Shuffle question order</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
