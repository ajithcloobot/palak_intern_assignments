<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventSync - Registration Form Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            padding: 40px;
        }
        .showcase {
            max-width: 1200px;
            margin: 0 auto;
        }
        .section-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 40px;
        }
        .devices {
            display: flex;
            gap: 60px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        
        /* Desktop View */
        .desktop-frame {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 480px;
        }
        .desktop-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            color: white;
            text-align: center;
        }
        .desktop-header h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .desktop-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .desktop-body {
            padding: 35px 30px;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #1a202c;
            background: white;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-register {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        /* Mobile View */
        .mobile-frame {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 300px;
            border: 8px solid #2d3748;
        }
        .mobile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            color: white;
            text-align: center;
        }
        .mobile-header h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .mobile-header p {
            font-size: 12px;
            opacity: 0.9;
        }
        .mobile-body {
            padding: 25px 20px;
        }
        .mobile-frame .form-group {
            margin-bottom: 18px;
        }
        .mobile-frame .form-group label {
            font-size: 13px;
            margin-bottom: 6px;
        }
        .mobile-frame .form-group input,
        .mobile-frame .form-group select {
            padding: 12px 14px;
            font-size: 14px;
        }
        .mobile-frame .btn-register {
            padding: 14px;
            font-size: 15px;
        }
        
        .device-label {
            text-align: center;
            font-size: 14px;
            color: #718096;
            margin-top: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="showcase">
        <h1 class="section-title">Registration Form - Responsive Design</h1>
        <div class="devices">
            <!-- Desktop View -->
            <div class="device-wrapper">
                <div class="desktop-frame">
                    <div class="desktop-header">
                        <h2>🎉 Event Registration</h2>
                        <p>Join our upcoming tech events</p>
                    </div>
                    <div class="desktop-body">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label>Select Event</label>
                            <select>
                                <option>Choose an event...</option>
                                <option>Tech Summit 2024</option>
                                <option>AI Workshop</option>
                                <option>Web Dev Bootcamp</option>
                                <option>Cloud Computing Day</option>
                            </select>
                        </div>
                        <button class="btn-register">Register Now →</button>
                    </div>
                </div>
                <div class="device-label">Desktop View (480px)</div>
            </div>
            
            <!-- Mobile View -->
            <div class="device-wrapper">
                <div class="mobile-frame">
                    <div class="mobile-header">
                        <h2>🎉 Event Registration</h2>
                        <p>Join our upcoming tech events</p>
                    </div>
                    <div class="mobile-body">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" placeholder="Enter name">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label>Select Event</label>
                            <select>
                                <option>Choose event...</option>
                                <option>Tech Summit 2024</option>
                                <option>AI Workshop</option>
                                <option>Web Dev Bootcamp</option>
                                <option>Cloud Computing Day</option>
                            </select>
                        </div>
                        <button class="btn-register">Register Now</button>
                    </div>
                </div>
                <div class="device-label">Mobile View (300px)</div>
            </div>
        </div>
    </div>
</body>
</html>
